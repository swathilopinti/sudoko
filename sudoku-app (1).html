<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku Game</title>
  <style>
    /* ── Base styles ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* ── Header ── */
    h1 { text-align: center; font-size: 26px; margin-bottom: 4px; }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    /* ── Difficulty buttons ── */
    .diff-group { display: flex; gap: 6px; }
    .diff-btn {
      padding: 5px 12px;
      border: 1.5px solid #aaa;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .diff-btn.active { background: #3b5bdb; color: white; border-color: #3b5bdb; }

    /* ── Timer & New Game ── */
    #timer { font-size: 15px; font-weight: bold; }
    #newBtn {
      padding: 6px 14px;
      background: #3b5bdb;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    /* ── Sudoku Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      background: #333;
      border: 3px solid #333;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .cell {
      aspect-ratio: 1;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.1s;
    }
    /* Thick box borders every 3 cells */
    .cell.box-right  { border-right:  2px solid #333; }
    .cell.box-bottom { border-bottom: 2px solid #333; }

    /* Cell highlight states */
    .cell.selected  { background: #d0e0ff; }
    .cell.related   { background: #f0f4ff; }
    .cell.same-num  { background: #e0e8ff; }

    /* Text colors */
    .cell.given     { color: #111; font-weight: bold; cursor: default; }
    .cell.user-val  { color: #3b5bdb; }
    .cell.error     { color: #e74c3c; }

    /* ── Number Pad ── */
    .numpad {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 5px;
      margin-bottom: 12px;
    }
    .num-key {
      padding: 10px 0;
      font-size: 17px;
      border: 1.5px solid #ddd;
      background: #f8f8f8;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
    }
    .num-key:hover { background: #e8eeff; border-color: #3b5bdb; color: #3b5bdb; }

    /* ── Action Buttons ── */
    .actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
    .action-btn {
      padding: 7px 16px;
      border: 1.5px solid #ccc;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .action-btn:hover  { border-color: #3b5bdb; color: #3b5bdb; }
    .action-btn.active { background: #e8eeff; border-color: #3b5bdb; color: #3b5bdb; }

    /* ── Status bar ── */
    #status { text-align: center; font-size: 13px; color: #888; }
  </style>
</head>
<body>
<div class="app">

  <h1>Sudoku</h1>

  <!-- Top row: difficulty + timer + new game -->
  <div class="top-row">
    <div class="diff-group">
      <button class="diff-btn active" data-level="easy">Easy</button>
      <button class="diff-btn"        data-level="medium">Medium</button>
      <button class="diff-btn"        data-level="hard">Hard</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="timer">0:00</span>
      <button id="newBtn">New Game</button>
    </div>
  </div>

  <!-- 9×9 Grid -->
  <div class="grid" id="grid"></div>

  <!-- Number input pad (1-9) -->
  <div class="numpad" id="numpad"></div>

  <!-- Undo / Notes / Hint / Erase -->
  <div class="actions">
    <button class="action-btn" id="undoBtn">↩ Undo</button>
    <button class="action-btn" id="noteBtn">✎ Notes</button>
    <button class="action-btn" id="hintBtn">💡 Hint</button>
    <button class="action-btn" id="eraseBtn">⌫ Erase</button>
  </div>

  <div id="status">Select a cell, then tap a number.</div>

</div>

<script>
// ─────────────────────────────────────────────
// HOW MANY CELLS TO REMOVE PER DIFFICULTY
// ─────────────────────────────────────────────
const REMOVE_COUNT = { easy: 36, medium: 46, hard: 55 };

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let solution = [];   // the fully solved grid
let puzzle   = [];   // grid with removed cells (0 = empty)
let board    = [];   // current player's grid
let notes    = [];   // per-cell pencil marks (Set of numbers)
let selected = null; // [row, col] of selected cell
let noteMode = false;
let history  = [];   // for undo
let level    = 'easy';
let timerSec = 0;
let timerRef = null;
let active   = false;

// ─────────────────────────────────────────────
// PUZZLE GENERATION
// ─────────────────────────────────────────────

// Fill an empty 9×9 board with a valid sudoku solution
function generateSolution() {
  const b = Array.from({ length: 9 }, () => Array(9).fill(0));

  function canPlace(r, c, n) {
    // Check row and column
    for (let i = 0; i < 9; i++)
      if (b[r][i] === n || b[i][c] === n) return false;
    // Check 3×3 box
    const br = Math.floor(r / 3) * 3;
    const bc = Math.floor(c / 3) * 3;
    for (let i = 0; i < 3; i++)
      for (let j = 0; j < 3; j++)
        if (b[br + i][bc + j] === n) return false;
    return true;
  }

  function fill(pos) {
    if (pos === 81) return true; // all cells filled
    const r = Math.floor(pos / 9), c = pos % 9;
    // Try numbers in random order
    const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
    for (const n of nums) {
      if (canPlace(r, c, n)) {
        b[r][c] = n;
        if (fill(pos + 1)) return true;
        b[r][c] = 0; // backtrack
      }
    }
    return false;
  }

  fill(0);
  return b;
}

// Remove cells from solution to create the puzzle
function createPuzzle(sol, removeCount) {
  const p = sol.map(row => [...row]);
  // Randomly pick cells to remove
  const indices = Array.from({ length: 81 }, (_, i) => i)
    .sort(() => Math.random() - 0.5)
    .slice(0, removeCount);
  for (const idx of indices)
    p[Math.floor(idx / 9)][idx % 9] = 0;
  return p;
}

// ─────────────────────────────────────────────
// START A NEW GAME
// ─────────────────────────────────────────────
function newGame() {
  clearInterval(timerRef);
  timerSec = 0; active = true; selected = null; noteMode = false; history = [];
  document.getElementById('noteBtn').classList.remove('active');

  solution = generateSolution();
  puzzle   = createPuzzle(solution, REMOVE_COUNT[level]);
  board    = puzzle.map(row => [...row]);
  notes    = Array.from({ length: 9 }, () =>
               Array.from({ length: 9 }, () => new Set()));

  timerRef = setInterval(() => { timerSec++; renderTimer(); }, 1000);
  renderTimer();
  renderGrid();
  setStatus('Select a cell, then tap a number.');
}

// ─────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────
function renderTimer() {
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      // Add thick borders for 3×3 box boundaries
      if ((c + 1) % 3 === 0 && c < 8) cell.classList.add('box-right');
      if ((r + 1) % 3 === 0 && r < 8) cell.classList.add('box-bottom');

      const val = board[r][c];

      if (puzzle[r][c] !== 0) {
        // Given (pre-filled) cell
        cell.classList.add('given');
        cell.textContent = val;
      } else if (val !== 0) {
        // User-entered cell
        cell.classList.add(val === solution[r][c] ? 'user-val' : 'error');
        cell.textContent = val;
      } else if (notes[r][c].size > 0) {
        // Show pencil notes in a 3×3 mini-grid
        cell.style.fontSize = '9px';
        cell.style.display = 'grid';
        cell.style.gridTemplateColumns = 'repeat(3,1fr)';
        cell.style.padding = '2px';
        for (let n = 1; n <= 9; n++) {
          const span = document.createElement('span');
          span.style.textAlign = 'center';
          span.style.color = '#888';
          span.textContent = notes[r][c].has(n) ? n : '';
          cell.appendChild(span);
        }
      }

      // Highlight: selected / related (same row, col, box) / same number
      if (selected) {
        const [sr, sc] = selected;
        if (r === sr && c === sc) {
          cell.classList.add('selected');
        } else if (
          r === sr || c === sc ||
          (Math.floor(r/3) === Math.floor(sr/3) && Math.floor(c/3) === Math.floor(sc/3))
        ) {
          cell.classList.add('related');
        } else if (val !== 0 && val === board[sr][sc]) {
          cell.classList.add('same-num');
        }
      }

      cell.addEventListener('click', () => { selected = [r, c]; renderGrid(); });
      grid.appendChild(cell);
    }
  }
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
function inputNumber(n) {
  if (!selected || !active) return;
  const [r, c] = selected;
  if (puzzle[r][c] !== 0) return; // can't edit given cells

  if (noteMode) {
    // Toggle note on/off
    const h = { type: 'note', r, c, before: new Set(notes[r][c]) };
    notes[r][c].has(n) ? notes[r][c].delete(n) : notes[r][c].add(n);
    h.after = new Set(notes[r][c]);
    history.push(h);
  } else {
    // Place number
    history.push({ type: 'cell', r, c, before: board[r][c], notesBefore: new Set(notes[r][c]) });
    board[r][c] = n;
    notes[r][c].clear();
  }

  renderGrid();
  checkWin();
}

function erase() {
  if (!selected) return;
  const [r, c] = selected;
  if (puzzle[r][c] !== 0) return;
  history.push({ type: 'cell', r, c, before: board[r][c], notesBefore: new Set(notes[r][c]) });
  board[r][c] = 0;
  notes[r][c].clear();
  renderGrid();
}

function undo() {
  if (!history.length) return;
  const h = history.pop();
  if (h.type === 'cell') { board[h.r][h.c] = h.before; notes[h.r][h.c] = h.notesBefore; }
  else { notes[h.r][h.c] = h.before; }
  renderGrid();
}

function hint() {
  // Find a random empty cell and fill it with the correct answer
  const empties = [];
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (board[r][c] === 0 && puzzle[r][c] === 0) empties.push([r, c]);
  if (!empties.length) return;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  history.push({ type: 'cell', r, c, before: 0, notesBefore: new Set() });
  board[r][c] = solution[r][c];
  selected = [r, c];
  renderGrid();
  checkWin();
}

// ─────────────────────────────────────────────
// WIN CHECK
// ─────────────────────────────────────────────
function checkWin() {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (board[r][c] !== solution[r][c]) return;

  active = false;
  clearInterval(timerRef);
  const m = Math.floor(timerSec / 60), s = timerSec % 60;
  setTimeout(() => {
    alert(`🎉 Puzzle solved!\nTime: ${m}:${s < 10 ? '0' : ''}${s} on ${level} mode.`);
  }, 100);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ─────────────────────────────────────────────
// BUILD NUMBER PAD (1–9)
// ─────────────────────────────────────────────
const numpad = document.getElementById('numpad');
for (let n = 1; n <= 9; n++) {
  const btn = document.createElement('div');
  btn.className = 'num-key';
  btn.textContent = n;
  btn.addEventListener('click', () => inputNumber(n));
  numpad.appendChild(btn);
}

// ─────────────────────────────────────────────
// BUTTON EVENT LISTENERS
// ─────────────────────────────────────────────
document.getElementById('newBtn').addEventListener('click', newGame);
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('eraseBtn').addEventListener('click', erase);
document.getElementById('hintBtn').addEventListener('click', hint);

document.getElementById('noteBtn').addEventListener('click', () => {
  noteMode = !noteMode;
  document.getElementById('noteBtn').classList.toggle('active', noteMode);
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = btn.dataset.level;
    newGame();
  });
});

// ─────────────────────────────────────────────
// KEYBOARD SUPPORT
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
  if (e.key === 'Backspace' || e.key === 'Delete') erase();
  if (e.key === 'ArrowRight' && selected) selected = [selected[0], Math.min(8, selected[1] + 1)];
  if (e.key === 'ArrowLeft'  && selected) selected = [selected[0], Math.max(0, selected[1] - 1)];
  if (e.key === 'ArrowDown'  && selected) selected = [Math.min(8, selected[0] + 1), selected[1]];
  if (e.key === 'ArrowUp'    && selected) selected = [Math.max(0, selected[0] - 1), selected[1]];
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') undo();
  renderGrid();
});

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
newGame();
</script>
</body>
</html>
